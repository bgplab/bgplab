# Configure a BGP session with an external BGP speaker

defaults.sources.extra: [ ../../defaults.yml ]
name: ipv6
plugin: [ bgp.session, check_validate, adjust ]

version: 2.0.0
_include: [ validate.yml ]

module: [ bgp ]

addressing:
  p2p.ipv6: 2001:db8:42::/48

groups:
  external:
    members: [ x1, x2 ]

nodes:
  rtr:
    bgp.as: 65000
    bgp.originate: [ 192.168.42.0/24 ]
    bgp.sessions:
      ipv4: [ ibgp, ebgp ]
      ipv6: []
  x1:
    bgp.as: 65100
    bgp.router_id: 10.0.0.10
    id: 10
    loopback.ipv4: 192.168.100.1/24
    loopback.ipv6: "2001:db8:100:1::1/48"
  x2:
    bgp.as: 65101
    bgp.router_id: 10.0.0.11
    id: 11
    loopback.ipv4: 192.168.101.1/24
    loopback.ipv6: "2001:db8:101:1::1/48"
links:
- rtr:
  x1:
    bgp.default_originate: True
- rtr:
  x2:
    bgp.default_originate: True

_adjust:
- nodes: [ x1 ]                     # Remove bgp.default_originate if the external router doesn't support it
  features:
  - key: bgp.default_originate
    value: true
  remove:
  - links[0].interfaces[1].bgp
  message: >-
    netlab cannot configure BGP default route on device {device} used for
    external routers. Configure the BGP default route on {node_list} manually
    if you want to get printouts matching the lab exercise.
- nodes: [ x2 ]                     # Remove bgp.default_originate if the external router doesn't support it
  features:
  - key: bgp.default_originate
    value: true
  remove:
  - links[1].interfaces[1].bgp
  message: >-
    netlab cannot configure BGP default route on device {device} used for
    external routers. Configure the BGP default route on {node_list} manually
    if you want to get printouts matching the lab exercise.

message: |
  The "Configure BGP for IPv6" lab is ready. Connect to your router
  with "netlab connect rtr".

  Have fun!
