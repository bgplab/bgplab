# Configure BGP on FRRouting

defaults.sources.extra: [ ../../defaults.yml ]
plugin: [ fix_frr ]
version: 2.0.0

# Make BGP a valid node attribute so we can configure bgp.as on the node not running BGP
defaults.attributes.node.bgp:

name: frrouting
defaults.device: frr

nodes:
  rtr:
    bgp.as: 65000
  x1:
    module: [ bgp ]
    bgp.as: 65100

links:
- rtr:
  x1:

message: |
  The "Configuring BGP on FRRouting" lab is ready. Connect to the lab
  devices with the "netlab connect" command.

  Good luck!
