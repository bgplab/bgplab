# Protect BGP sessions with MD5 passwords and GTSM

defaults.sources.extra: [ ../../defaults.yml ]
name: protect

version: 2.0.0
_include: [ validate.yml ]

module: [ bgp ]
plugin: [ bgp.session, check_validate, adjust ]

groups:
  external:
    members: [ x1, x2 ]

nodes:
  rtr:
    bgp.as: 65000
    bgp.originate: [ 192.168.42.0/24 ]
    bgp.advertise_loopback: False
  x1:
    bgp.as: 65100
    bgp.router_id: 10.0.0.10
    id: 10
    loopback.ipv4: 192.168.100.1/24
  x2:
    bgp.as: 65101
    bgp.router_id: 10.0.0.11
    id: 11
    loopback.ipv4: 192.168.101.1/24
links:
- rtr:
  x1:
    bgp.default_originate: True
    bgp.gtsm: True
- rtr:
  x2:
    bgp.default_originate: True
    bgp.password: GuessWhat

_adjust:
- nodes: [ x1, x2 ]                  # Remove bgp.default_originate if the external routers don't support it
  features:
  - key: bgp.default_originate
    value: true
  remove:
  - links[0].interfaces[1].bgp.default_originate
  - links[1].interfaces[1].bgp.default_originate
  warning: BGP default route cannot be configured on {device} used for external routers
  message: >-
    netlab cannot configure BGP default route on device {device} used for
    external routers. Configure the BGP default route on {node_list} manually
    if you want to get printouts matching the lab exercise.
- nodes: [ x1 ]                     # Remove bgp.gtsm if X1 doesn't support it
  features:
  - key: bgp.gtsm
    value: true
  remove:
  - links[0].interfaces[1].bgp.gtsm
  warning: netlab cannot configure TTL security on device {device} used for X1.
  message: >-
    netlab cannot configure TTL security on device {device} used for X1.
    It would be better to use a different device type for this external router.
- nodes: [ x2 ]                     # Remove bgp.password if X2 doesn't support it
  features:
  - key: bgp.password
    value: true
  remove:
  - links[1].interfaces[1].bgp.password
  warning: netlab cannot configure BGP MD5 password on device {device} used for X2.
  message: >-
    netlab cannot configure BGP MD5 password on device {device} used for X2.
    It would be better to use a different device type for this external router.

message: |
  The "Protect BGP Sessions with Passwords and GTSM" lab is ready. Connect to
  your router with "netlab connect rtr".

  Have fun!
