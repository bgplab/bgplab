# Configure a BGP route server
---
defaults.sources.extra: [ ../../defaults.yml ]

module: [ bgp ]
plugin: [ bgp.session, adjust ]

version: 2.0.0

nodes:
  rtr:
    bgp.as: 65000
  x1:
    bgp.as: 65100
    bgp.originate: [ 192.168.100.0/24, 172.16.8.0/22, 172.16.1.0/24 ]
links:
- rtr:
  x1:
    bgp.default_originate: True

_adjust:
- nodes: [ x1 ]                     # Remove bgp.default_originate if the external router doesn't support it
  features:
  - key: bgp.default_originate
    value: true
  remove:
  - links[0].interfaces[1].bgp
  warning: BGP default route cannot be configured on {device} used for external routers
  message: >-
    netlab cannot configure BGP default route on device {device} used for
    external routers. Configure the BGP default route on {node_list} manually
    if you want to get printouts matching the lab exercise.

message: |
  The "Use Outbound Route Filters (ORF) for IP Prefixes" lab is ready.
  Use "netlab connect" to connect to the lab devices.
