# Use BGP communities in a complex routing policy
---
defaults.sources.extra: [ ../../defaults.yml ]
plugin: [ check_extra_config, check_validate, bgp.policy ]

version: 2.0.0
_include: [ validate.yml ]

module: [ bgp ]

groups:
  external:
    members: [ c, x ]

nodes:
  isp:
    bgp.as: 65000
  c:
    id: 10
    bgp.router_id: 10.0.0.10
    bgp.as: 65304
    loopback.ipv4: 172.17.207.1/24
    module: [ bgp, routing ]
    routing:
      prefix.local.ipv4: 172.17.207.0/24
      policy.backup:
        match.prefix: local
        set.community.standard: "65000:50"
  x:
    id: 11
    bgp.router_id: 10.0.0.11
    bgp.as: 65207
    bgp.advertise_loopback: False

links:
- isp:
  c:
    bgp.policy.out: backup
  name: Customer uplink to ISP
- isp:
  x:
  name: Link to peer ISP
- c:
  x:
  name: Customer uplink to peer ISP

message: |
  The "Use BGP Communities in Routing Policies" lab is ready. Connect to your
  router with "netlab connect isp".

  Have fun ;)
