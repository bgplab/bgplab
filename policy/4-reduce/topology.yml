# Reduce the number of prefixes accepted from EBGP neighbors
---
defaults.sources.extra: [ ../../defaults.yml ]
version: 2.0.0

_include: [ validate.yml ]

module: [ bgp ]
plugin: [ bgp.session, bgp.policy, check_validate, adjust ]

groups:
  external:
    members: [ x1, x2 ]

nodes:
  rtr:
    bgp.as: 65000
    bgp.originate: [ 192.168.42.0/24 ]
  x1:
    bgp.as: 65100
    id: 10
    bgp.originate: [ 192.168.100.0/24 ]
  x2:
    bgp.as: 65101
    id: 11
    bgp.originate: [ 192.168.101.0/24 ]
links:
- rtr:
  x1:
    bgp.default_originate: True
- rtr:
  x2:
    bgp.default_originate: True
    bgp.locpref: 200
- x1:
  x2:

_adjust:
- nodes: [ x1, x2 ]                 # Remove bgp.default_originate if the external routers don't support it
  features:
  - key: bgp.default_originate
    value: true
  remove:
  - links[0].interfaces[1].bgp.default_originate
  - links[1].interfaces[1].bgp.default_originate
  warning: BGP default route cannot be configured on {device} used for external routers
  message: >-
    netlab cannot configure BGP default route on device {device} used for
    external routers. Configure the BGP default route on {node_list} manually
    if you want to get printouts matching the lab exercise.
- nodes: [ x2 ]                     # Remove bgp.locpref if the external routers don't support it
  features:
  - key: routing.policy.set.locpref
    value: true
  remove:
  - links[1].interfaces[1].bgp.locpref
  warning: BGP Local Preference cannot be configured on {device} used for external routers
  message: >-
    netlab cannot configure BGP local preference on device {device} used for
    external routers. Configure inbound BGP local preference on {node_list} manually
    if you want to get the full functionality of this lab exercise.

message: |
  The "Minimize the Size of Your BGP Table" lab is ready. Connect to your
  router with "netlab connect rtr".
