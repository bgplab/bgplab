# Configure a BGP route server
---
defaults.sources.extra: [ ../../defaults.yml ]

version: 2.0.0

plugin: [ check_extra_config, check_validate, prune_ebgp, bgp.session, adjust ]

module: [ bgp ]

groups:
  external:
    members: [ isp2, isp3 ]

nodes:
  rs:
    bgp.as: 65000
    bgp.advertise_loopback: False
  isp1:
    bgp.as: 65100
    bgp.router_id: 10.0.1.1
    loopback.ipv4: 192.168.100.1/24
  isp2:
    bgp.as: 65103
    bgp.router_id: 10.0.1.2
    loopback.ipv4: 192.168.103.1/24
  isp3:
    bgp.as: 65107
    bgp.router_id: 10.0.1.3
    loopback.ipv4: 192.168.107.1/24
links:
- rs:
  isp1:
  isp2:
  isp3:
  prefix.ipv4: 172.16.42.0/24
  name: IXP LAN

_adjust:
- nodes: [ isp2, isp3 ]                     # Warn if the external routers don't support bgp.rs_client
  features:
  - key: bgp.rs_client
    value: true
  warning: netlab cannot configure {device} nodes as route server clients
  message: >-
    netlab cannot configure {device} nodes {node_list} as route server
    clients. Configure that feature manually if you want to get the full
    functionality of this lab exercise.

_include: [ validate.yml ]

message: |
  The "BGP Route Server in an Internet Exchange Point" lab is ready.
  Use "netlab connect" to connect to the lab devices.
